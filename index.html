<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Final Fantasy VIII Quiz Game</title>
    <script type="text/javascript" src="main.js"></script>
    <style>
        @font-face {
            font-family: 'FF8';
            src: url("fonts/FF8.ttf") format('truetype');
        }
        body {
            background-color: #000000;
        }
        table {
            border-collapse: collapse;
            margin-left: 20px;
        }
        td {
            width: 1px;
            padding : 0;
            white-space: nowrap;
        }
        .pointer {
            margin-top: 20px;
            width: 50px;
            display: block;
        }
        .opaque {
            opacity: 0;
        }
        .hidden {
            visibility: hidden;
        }
        .confirm {
            display: block;
            justify-self: anchor-center;
            margin-top: 10px;
        }
        .questionBox {
            background-image: linear-gradient(to right, #413A37, #64605A);
            box-shadow:
                inset 0.2em 0.2em 0.2em 0 #727272,
                inset -0.2em -0.2em 0.2em 0 #313131;
            font-family: 'FF8';
            color: white;
            text-shadow: 2px 2px 0px #111;
            font-size: 30px;
            padding: 15px;
        }
    </style>
</head>
<body id="elemBody">
    <audio id="audioCursor"><source src="sounds/cursor.mp3" type="audio/mpeg" /></audio>
    <audio id="audioError"><source src="sounds/error.mp3" type="audio/mpeg" /></audio>
    <audio id="audioSalary"><source src="sounds/SeeDsalary.mp3" type="audio/mpeg" /></audio>
    <div id="divMusic"></div>
