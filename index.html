<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>title</title>
    <script type="text/javascript" src="main.js"></script>
    <style>
        @font-face {
            font-family: 'FF8';
            src: url("https://github.com/rustyworks/my-programming-font/raw/refs/heads/master/FF8.ttf") format('truetype');
        }
        body {
            background-color: #000000;
        }
        div {
            background-image: linear-gradient(to right, #413A37, #64605A);
            box-shadow:
                inset 0.2em 0.2em 0.2em 0 #727272,
                inset -0.2em -0.2em 0.2em 0 #313131;
            font-family: 'FF8';
            color: white;
            text-shadow: 2px 2px 0px #111;
            font-size: 30px;
            padding: 10px 0px 0px 15px;
        }
    </style>

<body>
    <div></div>
